<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 가족 메모장</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
        body {
            background-color: #141414;
            color: #ffffff;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 40px;
            box-sizing: border-box;
        }
        
        /* 📊 [우측 상단 사이드 고정] 스토리지 바 */
        .fixed-storage-header {
            display: none;
            position: fixed;
            top: 15px;
            right: 20px;
            background-color: rgba(34, 34, 34, 0.9);
            backdrop-filter: blur(6px);
            border: 1px solid #444;
            padding: 10px 15px;
            border-radius: 8px;
            box-sizing: border-box;
            z-index: 9999;
            width: 280px;
        }
        .storage-flex-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .storage-text-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .storage-text-row span {
            font-size: 12px;
            color: #aaa;
            font-weight: bold;
        }
        .progress-container {
            width: 100%;
            height: 12px;
            background-color: #222;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            border: 1px solid #333;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #e50914, #ff6b6b);
            border-radius: 6px;
            transition: width 0.3s ease;
        }
        .progress-text {
            font-size: 11px;
            font-weight: bold;
            color: #ff6b6b;
        }
        .refresh-btn {
            background: none;
            border: none;
            color: #666;
            padding: 0;
            font-size: 11px;
            cursor: pointer;
            text-decoration: underline;
        }
        .refresh-btn:hover {
            color: #aaa;
        }

        /* 📅 [좌측 사이드 고정] 날짜별 작업 선택 달력 영역 */
        .fixed-calendar-sidebar {
            display: none;
            position: fixed;
            top: 15px;
            left: 20px;
            background-color: #222;
            border: 1px solid #444;
            padding: 15px;
            border-radius: 8px;
            width: 260px;
            box-sizing: border-box;
            z-index: 9998;
        }
        .calendar-sidebar-title {
            font-size: 14px;
            font-weight: bold;
            color: #aaa;
            margin-top: 0;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .calendar-sidebar-title button {
            background: #333;
            border: 1px solid #555;
            color: #fff;
            padding: 2px 6px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
        }
        .calendar-sidebar-title button:hover {
            background: #e50914;
            border-color: #e50914;
        }
        .fixed-calendar-sidebar input[type="date"] {
            width: 100%;
            padding: 8px;
            background-color: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
        }
        .filter-status {
            margin-top: 8px;
            font-size: 12px;
            color: #ff6b6b;
            display: none;
        }

        /* 메인 레이아웃 구성 */
        .main-wrapper {
            width: 90%;
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 5px;
        }

        /* 로그인 / 프로필 선택 화면 */
        .login-container {
            text-align: center;
            margin-top: 10vh;
            width: 100%;
        }
        h1 {
            font-size: 44px;
            font-weight: 500;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        .subtitle {
            font-size: 18px;
            color: #808080;
            margin-bottom: 40px;
        }
        .profile-list {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        .profile-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 130px;
        }
        .avatar-box {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            transition: transform 0.2s ease, border 0.2s ease;
            border: 3px solid transparent;
        }
        .papa   { background-color: #ffd643; }
        .mama   { background-color: #fca5a5; }
        .son1   { background-color: #93c5fd; }
        .son2   { background-color: #94a3b8; }

        .profile-card:hover .avatar-box {
            transform: scale(1.05);
            border: 3px solid #ffffff;
        }
        .profile-name {
            margin-top: 15px;
            font-size: 16px;
            color: #808080;
            transition: color 0.2s ease;
        }
        .profile-card:hover .profile-name {
            color: #ffffff;
        }

        /* 메모장 본문 영역 */
        .memo-container {
            display: none;
            text-align: center;
            width: 100%;
        }
        .welcome-title {
            font-size: 32px;
            margin-bottom: 5px;
        }
        
        /* 🛠️ [수정] 여러 줄 입력용 테두리 박스 및 textarea 양식 스타일 */
        .input-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 25px 0;
            background-color: #222;
            padding: 20px;
            border-radius: 8px;
        }
        .input-box textarea {
            padding: 15px;
            border-radius: 6px;
            border: none;
            background-color: #333;
            color: white;
            font-size: 16px;
            font-family: 'Noto Sans KR', sans-serif;
            resize: vertical; /* 사용자가 아래로 크기를 조절할 수 있게 허용 */
            min-height: 100px; /* 기본 세로 높이 */
            line-height: 1.5;
            outline: none;
        }
        
        /* 📎 캡처 이미지 미리보기 영역 */
        .preview-area {
            display: none;
            position: relative;
            margin-top: 5px;
            text-align: center;
            background-color: #333;
            padding: 10px;
            border-radius: 6px;
        }
        .preview-img {
            max-height: 150px;
            border-radius: 4px;
        }
        .cancel-preview {
            position: absolute;
            top: 5px;
            right: 10px;
            background: #e50914;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-weight: bold;
        }

        .input-box button {
            padding: 15px;
            border-radius: 6px;
            border: none;
            background-color: #e50914;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .input-box button:hover {
            background-color: #b81d24;
        }

        /* 메모 리스트 출력 */
        .memo-list {
            background-color: #222;
            padding: 20px;
            border-radius: 12px;
            min-height: 200px;
            text-align: left;
        }
        .memo-item {
            background-color: #333;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .memo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .memo-text {
            font-size: 16px;
            word-break: break-all;
            white-space: pre-wrap; /* 서버에서 엔터값을 줄바꿈으로 인식해 그리는 핵심 설정 */
            line-height: 1.5;
        }
        
        .memo-image {
            max-width: 100%;
            border-radius: 6px;
            margin-top: 10px;
            display: block;
        }

        /* 날짜 시간 정보 및 수정 버튼 구역 스타일 */
        .memo-info-line {
            margin-top: 12px;
            font-size: 12px;
            color: #aaa;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #444;
            padding-top: 8px;
        }
        .edit-action-btn {
            background: none;
            border: none;
            color: #64b5f6;
            cursor: pointer;
            font-size: 12px;
            padding: 0;
            text-decoration: underline;
        }
        .edit-action-btn:hover {
            color: #2196f3;
        }

        /* 넷플릭스 스타일 작성자 배지 */
        .author-badge { 
            padding: 3px 8px; 
            border-radius: 4px; 
            font-weight: bold; 
            font-size: 11px; 
            display: inline-block; 
            vertical-align: middle; 
        }
        .badge-아빠 { background: #fde047; color: #854d0e; }
        .badge-엄마 { background: #fca5a5; color: #991b1b; }
        .badge-아들1 { background: #93c5fd; color: #1e40af; }
        .badge-아들2 { background: #94a3b8; color: #1e293b; }

        .delete-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 16px;
        }
        .no-memo {
            color: #666;
            text-align: center;
            margin-top: 80px;
        }

        /* 화면이 좁은 모바일일 때 사이드바 처리 */
        @media (max-width: 1200px) {
            body {
                flex-direction: column;
                align-items: center;
                padding-top: 20px;
            }
            .fixed-storage-header, .fixed-calendar-sidebar {
                position: static;
                width: 100%;
                max-width: 600px;
                margin: 0 auto 15px auto;
            }
            .login-container {
                margin-top: 5vh;
            }
        }
    </style>
</head>
<body>

<div class="fixed-storage-header" id="fixedStorageHeader">
    <div class="storage-flex-container">
        <div class="storage-text-row">
            <span>📊 서버 용량 (5GB)</span>
            <button onclick="checkStorageUsage()" class="refresh-btn">새로고침</button>
        </div>
        <div class="progress-container">
            <div id="storageProgressBar" class="progress-bar"></div>
        </div>
        <div style="text-align: right;">
            <span id="storageUsageText" class="progress-text">계산 중...</span>
        </div>
    </div>
</div>

<div class="fixed-calendar-sidebar" id="fixedCalendarSidebar">
    <div class="calendar-sidebar-title">
        <span>📅 날짜별 작업 검색</span>
        <button onclick="clearDateFilter()">전체보기</button>
    </div>
    <input type="date" id="calendarFilterInput" onchange="filterMemosByDate()">
    <div id="filterStatusText" class="filter-status">선택된 날짜 보기 중</div>
</div>

<div class="main-wrapper">

    <div class="login-container" id="loginScreen">
        <h1>우리 가족 메모장 로그인</h1>
        <div class="subtitle">사용하실 프로필을 선택해 주세요.</div>

        <div class="profile-list">
            <div class="profile-card" onclick="enterMemoApp('아빠')">
                <div class="avatar-box papa">👨</div>
                <div class="profile-name">아빠</div>
            </div>
            <div class="profile-card" onclick="enterMemoApp('엄마')">
                <div class="avatar-box mama">👩</div>
                <div class="profile-name">엄마</div>
            </div>
            <div class="profile-card" onclick="enterMemoApp('아들1')">
                <div class="avatar-box son1">👦</div>
                <div class="profile-name">아들1</div>
            </div>
            <div class="profile-card" onclick="enterMemoApp('아들2')">
                <div class="avatar-box son2">🧑</div>
                <div class="profile-name">아들2</div>
            </div>
        </div>
    </div>

    <div class="memo-container" id="memoScreen">
        <h2 class="welcome-title" id="welcomeMessage">❤️ 가족 메모장</h2>
        <p style="color: #aaa; margin-bottom: 20px;">우리 가족이 함께 공유하는 실시간 공간입니다.</p>
        
        <div class="input-box">
            <textarea id="memoInput" placeholder="메모 입력 혹은 캡처본을 여기에 붙여넣기(Ctrl+V) 하세요...&#10;(엔터를 치면 다음 줄로 바뀝니다. 등록은 Ctrl+Enter)" onkeydown="handleKeyDown(event)"></textarea>
            
            <div class="preview-area" id="previewArea">
                <button class="cancel-preview" onclick="clearPreview()">X</button>
                <img src="" id="previewImg" class="preview-img" alt="캡처 미리보기">
                <div style="font-size: 12px; color: #aaa; margin-top: 5px;">캡처된 이미지가 감지되었습니다.</div>
            </div>

            <button id="submitBtn" onclick="saveMemo()">메모 등록하기</button>
        </div>

        <div class="memo-list" id="memoListArea">
            <div class="no-memo">아직 작성된 메모가 없습니다.</div>
        </div>
    </div>

</div>

<script>
    // 🔗 파이어베이스 연결 정보 세팅
    const firebaseConfig = {
        databaseURL: "https://family-memo-9c3dc-default-rtdb.firebaseio.com",
        storageBucket: "family-memo-9c3dc.firebasestorage.app"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const storage = firebase.storage();

    let currentWriter = "";
