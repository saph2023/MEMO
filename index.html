<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 가족 메모장</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body {
            background-color: #141414;
            color: #ffffff;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        
        /* [기존 양식] 로그인 / 프로필 선택 화면 */
        .login-container {
            text-align: center;
        }
        h1 {
            font-size: 44px;
            font-weight: 500;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        .subtitle {
            font-size: 18px;
            color: #808080;
            margin-bottom: 40px;
        }
        .profile-list {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        .profile-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 130px;
        }
        .avatar-box {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            transition: transform 0.2s ease, border 0.2s ease;
            border: 3px solid transparent;
        }
        .papa   { background-color: #ffd643; }
        .mama   { background-color: #fca5a5; }
        .son1   { background-color: #93c5fd; }
        .son2   { background-color: #94a3b8; }

        .profile-card:hover .avatar-box {
            transform: scale(1.05);
            border: 3px solid #ffffff;
        }
        .profile-name {
            margin-top: 15px;
            font-size: 16px;
            color: #808080;
            transition: color 0.2s ease;
        }
        .profile-card:hover .profile-name {
            color: #ffffff;
        }

        /* [기존 양식] 메모장 본문 및 내용 구역 */
        .memo-container {
            display: none;
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding: 20px 0;
        }
        .welcome-title {
            font-size: 32px;
            margin-bottom: 5px;
        }
        
        /* 메모 및 그림 주소 입력창 */
        .input-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 25px 0;
        }
        .input-box input {
            padding: 15px;
            border-radius: 8px;
            border: none;
            background-color: #333;
            color: white;
            font-size: 16px;
        }
        .input-box button {
            padding: 15px;
            border-radius: 8px;
            border: none;
            background-color: #e50914;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .input-box button:hover {
            background-color: #b81d24;
        }

        /* 메모 리스트 출력 공간 */
        .memo-list {
            background-color: #222;
            padding: 20px;
            border-radius: 12px;
            min-height: 200px;
            text-align: left;
        }
        .memo-item {
            background-color: #333;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .memo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .memo-text {
            font-size: 16px;
            word-break: break-all;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        
        /* 🖼️ 예전 폼의 그림 출력 스타일 유지 */
        .memo-image {
            max-width: 100%;
            border-radius: 6px;
            margin-top: 10px;
            display: block;
        }

        /* 넷플릭스 스타일 작성자 배지 양식 */
        .author-badge { 
            padding: 3px 8px; 
            border-radius: 4px; 
            font-weight: bold; 
            font-size: 11px; 
            display: inline-block; 
            vertical-align: middle; 
        }
        .badge-아빠 { background: #fde047; color: #854d0e; }
        .badge-엄마 { background: #fca5a5; color: #991b1b; }
        .badge-아들1 { background: #93c5fd; color: #1e40af; }
        .badge-아들2 { background: #94a3b8; color: #1e293b; }

        .delete-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 16px;
        }
        .no-memo {
            color: #666;
            text-align: center;
            margin-top: 80px;
        }
    </style>
</head>
<body>

<div class="login-container" id="loginScreen">
    <h1>우리 가족 메모장 로그인</h1>
    <div class="subtitle">사용하실 프로필을 선택해 주세요.</div>

    <div class="profile-list">
        <div class="profile-card" onclick="enterMemoApp('아빠')">
            <div class="avatar-box papa">👨</div>
            <div class="profile-name">아빠</div>
        </div>
        <div class="profile-card" onclick="enterMemoApp('엄마')">
            <div class="avatar-box mama">👩</div>
            <div class="profile-name">엄마</div>
        </div>
        <div class="profile-card" onclick="enterMemoApp('아들1')">
            <div class="avatar-box son1">👦</div>
            <div class="profile-name">아들1</div>
        </div>
        <div class="profile-card" onclick="enterMemoApp('아들2')">
            <div class="avatar-box son2">🧑</div>
            <div class="profile-name">아들2</div>
        </div>
    </div>
</div>

<div class="memo-container" id="memoScreen">
    <h2 class="welcome-title" id="welcomeMessage">❤️ 가족 메모장</h2>
    <p style="color: #aaa; margin-bottom: 20px;">우리 가족이 함께 공유하는 실시간 공간입니다.</p>
    
    <div class="input-box">
        <input type="text" id="memoInput" placeholder="가족에게 남길 메모 내용을 입력하세요...">
        <input type="text" id="imageInput" placeholder="올릴 그림(이미지)의 직접 링크 주소를 입력하세요 (선택)...">
        <button onclick="saveMemo()">메모 등록하기</button>
    </div>

    <div class="memo-list" id="memoListArea">
        <div class="no-memo">아직 작성된 메모가 없습니다.</div>
    </div>
</div>

<script>
    // 🔗 파이어베이스 데이터베이스 정보 연결
    const firebaseConfig = {
        databaseURL: "https://family-memo-9c3dc-default-rtdb.firebaseio.com"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentWriter = "";

    // 프로필 입장 함수
    function enterMemoApp(name) {
        currentWriter = name;
        
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('memoScreen').style.display = 'block';
        document.getElementById('welcomeMessage').innerText = "❤️ " + name + " 님의 가족 메모장";
        
        // 실시간 동기화 호출
        loadMemos();
    }

    // 메모와 이미지 주소를 함께 파이어베이스에 저장하는 함수
    function saveMemo() {
        const memoInput = document.getElementById('memoInput');
        const imageInput = document.getElementById('imageInput');
        
        const text = memoInput.value.trim();
        const imgUrl = imageInput.value.trim();
        
        if (text === "" && imgUrl === "") return; // 둘 다 빈칸이면 무시

        database.ref('memos').push({
            writer: currentWriter,
            content: text,
            imageUrl: imgUrl, // 포스트이미지 등에서 가져온 그림 주소 저장
            timestamp: Date.now()
        });

        memoInput.value = ""; 
        imageInput.value = ""; 
    }

    // ⭐ [핵심 변경] 최신 내용이 무조건 맨 위로 올라오게 데이터를 로드하는 함수
    function loadMemos() {
        database.ref('memos').on('value', (snapshot) => {
            const listArea = document.getElementById('memoListArea');
            listArea.innerHTML = ""; 

            const data = snapshot.val();
            
            if (!data) {
                listArea.innerHTML = '<div class="no-memo">아직 작성된 메모가 없습니다.</div>';
                return;
            }

            // 실시간 데이터를 하나씩 꺼내어 화면에 추가
            Object.keys(data).forEach((key) => {
                const memo = data[key];
                
                const itemDiv = document.createElement('div');
                itemDiv.className = 'memo-item';
                
                // 그림 주소(imageUrl)가 등록되어 있으면 img 태그를 생성하고, 없으면 공백 처리
                const imgTag = memo.imageUrl ? `<img src="${memo.imageUrl}" class="memo-image" alt="가족 업로드 이미지">` : '';
                
                itemDiv.innerHTML = `
                    <div class="memo-header">
                        <span class="author-badge badge-${memo.writer}">${memo.writer}</span>
                        <button class="delete-btn" onclick="deleteMemo('${key}')">❌</button>
                    </div>
                    <div class="memo-text">${memo.content}</div>
                    ${imgTag}
                `;
                
                // 💡 [insertBefore] 명령을 사용하여 새로운(최신) 메모가 리스트의 맨 위(첫 번째 위치)로 가도록 강제 정렬합니다.
                listArea.insertBefore(itemDiv, listArea.firstChild);
            });
        });
    }

    // 메모 삭제 처리
    function deleteMemo(key) {
        if (confirm("이 메모를 정말 삭제하시겠습니까?")) {
            database.ref('memos/' + key).remove();
        }
    }
</script>

</body>
</html>
