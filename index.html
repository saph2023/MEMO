<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 가족 메모장</title>
    <style>
        body {
            background-color: #141414;
            color: #ffffff;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        
        /* 1. 로그인 화면 스타일 */
        .login-container {
            text-align: center;
            transition: opacity 0.5s ease;
        }
        h1 {
            font-size: 44px;
            font-weight: 500;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        .subtitle {
            font-size: 18px;
            color: #808080;
            margin-bottom: 40px;
        }
        .profile-list {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        .profile-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 130px;
        }
        .avatar-box {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            transition: transform 0.2s ease, border 0.2s ease;
            border: 3px solid transparent;
        }
        .papa   { background-color: #ffd643; }
        .mama   { background-color: #fca5a5; }
        .son1   { background-color: #93c5fd; }
        .son2   { background-color: #94a3b8; }

        .profile-card:hover .avatar-box {
            transform: scale(1.05);
            border: 3px solid #ffffff;
        }
        .profile-name {
            margin-top: 15px;
            font-size: 16px;
            color: #808080;
            transition: color 0.2s ease;
        }
        .profile-card:hover .profile-name {
            color: #ffffff;
        }

        /* 2. 실제 메모장 본문 화면 스타일 (처음에는 숨겨둠) */
        .memo-container {
            display: none; /* 처음에 숨김 */
            width: 90%;
            max-width: 600px;
            text-align: center;
            animation: fadeIn 0.5s ease forwards;
        }
        .memo-box {
            background-color: #222;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            min-height: 200px;
            text-align: left;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="login-container" id="loginScreen">
    <h1>우리 가족 메모장 로그인</h1>
    <div class="subtitle">사용하실 프로필을 선택해 주세요.</div>

    <div class="profile-list">
        <div class="profile-card" onclick="enterMemoApp('아빠')">
            <div class="avatar-box papa">👨</div>
            <div class="profile-name">아빠</div>
        </div>
        <div class="profile-card" onclick="enterMemoApp('엄마')">
            <div class="avatar-box mama">👩</div>
            <div class="profile-name">엄마</div>
        </div>
        <div class="profile-card" onclick="enterMemoApp('아들1')">
            <div class="avatar-box son1">👦</div>
            <div class="profile-name">아들1</div>
        </div>
        <div class="profile-card" onclick="enterMemoApp('아들2')">
            <div class="avatar-box son2">🧑</div>
            <div class="profile-name">아들2</div>
        </div>
    </div>
</div>

<div class="memo-container" id="memoScreen">
    <h2 id="welcomeMessage">○○ 님의 가족 메모장</h2>
    <p style="color: #aaa;">이제 파이어베이스에 데이터를 쓰고 읽을 수 있습니다!</p>
    
    <div class="memo-box">
        <p style="color: #666;">아직 작성된 메모가 없습니다.</p>
    </div>
</div>

<script>
    // 프로필을 누르면 실행되는 함수
    function enterMemoApp(name) {
        // 1. 로그인 화면을 숨깁니다.
        document.getElementById('loginScreen').style.display = 'none';
        
        // 2. 메모장 화면을 보여줍니다.
        const memoScreen = document.getElementById('memoScreen');
        memoScreen.style.display = 'block';
        
        // 3. 선택한 프로필 이름으로 상단 환영 문구를 변경합니다.
        document.getElementById('welcomeMessage').innerText = "❤️ " + name + " 님의 가족 메모장";
    }
</script>

</body>
</html>
