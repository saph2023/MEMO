<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 가족 메모장</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
        body {
            background-color: #141414;
            color: #ffffff;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        
        /* 로그인 / 프로필 선택 화면 */
        .login-container {
            text-align: center;
        }
        h1 {
            font-size: 44px;
            font-weight: 500;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        .subtitle {
            font-size: 18px;
            color: #808080;
            margin-bottom: 40px;
        }
        .profile-list {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        .profile-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 130px;
        }
        .avatar-box {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            transition: transform 0.2s ease, border 0.2s ease;
            border: 3px solid transparent;
        }
        .papa   { background-color: #ffd643; }
        .mama   { background-color: #fca5a5; }
        .son1   { background-color: #93c5fd; }
        .son2   { background-color: #94a3b8; }

        .profile-card:hover .avatar-box {
            transform: scale(1.05);
            border: 3px solid #ffffff;
        }
        .profile-name {
            margin-top: 15px;
            font-size: 16px;
            color: #808080;
            transition: color 0.2s ease;
        }
        .profile-card:hover .profile-name {
            color: #ffffff;
        }

        /* 메모장 본문 영역 */
        .memo-container {
            display: none;
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding: 20px 0;
        }
        .welcome-title {
            font-size: 32px;
            margin-bottom: 5px;
        }
        
        /* 메모 입력 구역 */
        .input-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 25px 0;
            background-color: #222;
            padding: 20px;
            border-radius: 8px;
        }
        .input-box input[type="text"] {
            padding: 15px;
            border-radius: 6px;
            border: none;
            background-color: #333;
            color: white;
            font-size: 16px;
        }
        
        /* 📎 캡처 이미지 미리보기 영역 */
        .preview-area {
            display: none;
            position: relative;
            margin-top: 5px;
            text-align: center;
            background-color: #333;
            padding: 10px;
            border-radius: 6px;
        }
        .preview-img {
            max-height: 150px;
            border-radius: 4px;
        }
        .cancel-preview {
            position: absolute;
            top: 5px;
            right: 10px;
            background: #e50914;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-weight: bold;
        }

        .input-box button {
            padding: 15px;
            border-radius: 6px;
            border: none;
            background-color: #e50914;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .input-box button:hover {
            background-color: #b81d24;
        }

        /* 메모 리스트 출력 */
        .memo-list {
            background-color: #222;
            padding: 20px;
            border-radius: 12px;
            min-height: 200px;
            text-align: left;
        }
        .memo-item {
            background-color: #333;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .memo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .memo-text {
            font-size: 16px;
            word-break: break-all;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        
        .memo-image {
            max-width: 100%;
            border-radius: 6px;
            margin-top: 10px;
            display: block;
        }

        /* 넷플릭스 스타일 작성자 배지 */
        .author-badge { 
            padding: 3px 8px; 
            border-radius: 4px; 
            font-weight: bold; 
            font-size: 11px; 
            display: inline-block; 
            vertical-align: middle; 
        }
        .badge-아빠 { background: #fde047; color: #854d0e; }
        .badge-엄마 { background: #fca5a5; color: #991b1b; }
        .badge-아들1 { background: #93c5fd; color: #1e40af; }
        .badge-아들2 { background: #94a3b8; color: #1e293b; }

        .delete-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 16px;
        }
        .no-memo {
            color: #666;
            text-align: center;
            margin-top: 80px;
        }
    </style>
</head>
<body>

<div class="login-container" id="loginScreen">
    <h1>우리 가족 메모장 로그인</h1>
    <div class="subtitle">사용하실 프로필을 선택해 주세요.</div>

    <div class="profile-list">
        <div class="profile-card" onclick="enterMemoApp('아빠')">
            <div class="avatar-box papa">👨</div>
            <div class="profile-name">아빠</div>
        </div>
        <div class="profile-card" onclick="enterMemoApp('엄마')">
            <div class="avatar-box mama">👩</div>
            <div class="profile-name">엄마</div>
        </div>
        <div class="profile-card" onclick="enterMemoApp('아들1')">
            <div class="avatar-box son1">👦</div>
            <div class="profile-name">아들1</div>
        </div>
        <div class="profile-card" onclick="enterMemoApp('아들2')">
            <div class="avatar-box son2">🧑</div>
            <div class="profile-name">아들2</div>
        </div>
    </div>
</div>

<div class="memo-container" id="memoScreen">
    <h2 class="welcome-title" id="welcomeMessage">❤️ 가족 메모장</h2>
    <p style="color: #aaa; margin-bottom: 20px;">우리 가족이 함께 공유하는 실시간 공간입니다.</p>
    
    <div class="input-box">
        <input type="text" id="memoInput" placeholder="메모 입력 혹은 캡처본을 여기에 붙여넣기(Ctrl+V) 하세요...">
        
        <div class="preview-area" id="previewArea">
            <button class="cancel-preview" onclick="clearPreview()">X</button>
            <img src="" id="previewImg" class="preview-img" alt="캡처 미리보기">
            <div style="font-size: 12px; color: #aaa; margin-top: 5px;">캡처된 이미지가 감지되었습니다.</div>
        </div>

        <button id="submitBtn" onclick="saveMemo()">메모 등록하기</button>
    </div>

    <div class="memo-list" id="memoListArea">
        <div class="no-memo">아직 작성된 메모가 없습니다.</div>
    </div>

    <div style="background-color: #222; margin-top: 30px; padding: 20px; border-radius: 12px; text-align: left; position: relative;">
        <h3 style="font-size: 18px; color: #aaa; margin-bottom: 10px;">📊 스토리지 사용 현황 (Spark 무료)</h3>
        <p style="font-size: 14px; color: #888; margin: 0 0 15px 0; font-weight: normal;">우리 가족이 함께 쓰는 사진 서랍 공간입니다.</p>

        <div style="width: 100%; height: 25px; background-color: #333; border-radius: 15px; position: relative; overflow: hidden; border: 1px solid #444;">
            <div id="storageProgressBar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #e50914, #ff6b6b); border-radius: 15px; transition: width 0.3s ease;"></div>
            <span id="storageUsageText" style="position: absolute; width: 100%; text-align: center; left: 0; top: 3px; font-size: 14px; font-weight: bold; color: white;">확인 중... / 5GB</span>
        </div>
        
        <button onclick="checkStorageUsage()" style="position: absolute; right: 20px; top: 15px; background: none; border: 1px solid #444; color: #888; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;">새로고침</button>
    </div>
</div>

<script>
    // 🔗 파이어베이스 연결 정보 세팅
    const firebaseConfig = {
        databaseURL: "https://family-memo
