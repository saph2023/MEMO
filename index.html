<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 가족 메모장 로그인</title>
    <style>
        body {
            background-color: #141414;
            color: #ffffff;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            text-align: center;
        }
        h1 {
            font-size: 44px;
            font-weight: 500;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        .subtitle {
            font-size: 18px;
            color: #808080;
            margin-bottom: 40px;
        }
        .profile-list {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        .profile-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 130px;
        }
        .avatar-box {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            transition: transform 0.2s ease, border 0.2s ease;
            border: 3px solid transparent;
        }
        /* 프로필별 배경색 지정 (기존 배지 스타일 반영) */
        .papa   { background-color: #fde047; }
        .mama   { background-color: #fca5a5; }
        .son1   { background-color: #93c5fd; }
        .son2   { background-color: #94a3b8; }

        .profile-card:hover .avatar-box {
            transform: scale(1.05);
            border: 3px solid #ffffff;
        }
        .profile-name {
            margin-top: 15px;
            font-size: 16px;
            color: #808080;
            transition: color 0.2s ease;
        }
        .profile-card:hover .profile-name {
            color: #ffffff;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h1>우리 가족 메모장 로그인</h1>
    <div class="subtitle">사용하실 프로필을 선택해 주세요.</div>

    <div class="profile-list">
        <div class="profile-card" onclick="selectProfile('아빠')">
            <div class="avatar-box papa">👨</div>
            <div class="profile-name">아빠</div>
        </div>
        <div class="profile-card" onclick="selectProfile('엄마')">
            <div class="avatar-box mama">👩</div>
            <div class="profile-name">엄마</div>
        </div>
        <div class="profile-card" onclick="selectProfile('아들1')">
            <div class="avatar-box son1">👦</div>
            <div class="profile-name">아들1</div>
        </div>
        <div class="profile-card" onclick="selectProfile('아들2')">
            <div class="avatar-box son2">🧑</div>
            <div class="profile-name">아들2</div>
        </div>
    </div>
</div>

<script>
