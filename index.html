<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 가족 메모장</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

    <style>
        body {
            background-color: #141414;
            color: #ffffff;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        
        /* [기존 양식] 로그인 / 프로필 선택 화면 */
        .login-container {
            text-align: center;
        }
        h1 {
            font-size: 44px;
            font-weight: 500;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        .subtitle {
            font-size: 18px;
            color: #808080;
            margin-bottom: 40px;
        }
        .profile-list {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        .profile-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 130px;
        }
        .avatar-box {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            transition: transform 0.2s ease, border 0.2s ease;
            border: 3px solid transparent;
        }
        .papa   { background-color: #ffd643; }
        .mama   { background-color: #fca5a5; }
        .son1   { background-color: #93c5fd; }
        .son2   { background-color: #94a3b8; }

        .profile-card:hover .avatar-box {
            transform: scale(1.05);
            border: 3px solid #ffffff;
        }
        .profile-name {
            margin-top: 15px;
            font-size: 16px;
            color: #808080;
            transition: color 0.2s ease;
        }
        .profile-card:hover .profile-name {
            color: #ffffff;
        }

        /* [기존 양식] 메모장 본문 영역 */
        .memo-container {
            display: none;
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding: 20px 0;
        }
        .welcome-title {
            font-size: 32px;
            margin-bottom: 5px;
        }
        
        /* 메모 입력 구역 */
        .input-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 25px 0;
            background-color: #222;
            padding: 20px;
            border-radius: 8px;
        }
        .input-box input[type="text"] {
            padding: 15px;
            border-radius: 6px;
            border: none;
            background-color: #333;
            color: white;
            font-size: 16px;
        }
        
        /* 📎 캡처 이미지 미리보기 영역 스킨 */
        .preview-area {
            display: none;
            position: relative;
            margin-top: 5px;
            text-align: center;
            background-color: #333;
            padding: 10px;
            border-radius: 6px;
        }
        .preview-img {
            max-height: 150px;
            border-radius: 4px;
        }
        .cancel-preview {
            position: absolute;
            top: 5px;
            right: 10px;
            background: #e50914;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-weight: bold;
        }

        .input-box button {
            padding: 15px;
            border-radius: 6px;
            border: none;
            background-color: #e50914;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .input-box button:hover {
            background-color: #b81d24;
        }

        /* 메모 리스트 출력 */
        .memo-list {
            background-color: #222;
            padding: 20px;
            border-radius: 12px;
            min-height: 200px;
            text-align: left;
        }
        .memo-item {
            background-color: #333;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .memo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .memo-text {
            font-size: 16px;
            word-break: break-all;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        
        /* 화면에 출력되는 이미지 스타일 */
        .memo-image {
            max-width: 100%;
            border-radius: 6px;
            margin-top: 10px;
            display: block;
        }

        /* 넷플릭스 스타일 작성자 배지 양식 */
        .author-badge { 
            padding: 3px 8px; 
            border-radius: 4px; 
            font-weight: bold; 
            font-size: 11px; 
            display: inline-block; 
            vertical-align: middle; 
        }
        .badge-아빠 { background: #fde047; color: #854d0e; }
        .badge-엄마 { background: #fca5a5; color: #991b1b; }
        .badge-아들1 { background: #93c5fd; color: #1e40af; }
        .badge-아들2 { background: #94a3b8; color: #1e293b; }

        .delete-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 16px;
        }
        .no-memo {
            color: #666;
            text-align: center;
            margin-top: 80px;
        }
    </style>
</head>
<body>

<div class="login-container" id="loginScreen">
    <h1>우리 가족 메모장 로그인</h1>
    <div class="subtitle">사용하실 프로필을 선택해 주세요.</div>

    <div class="profile-list">
        <div class="profile-card" onclick="enterMemoApp('아빠')">
            <div class="avatar-box papa">👨</div>
            <div class="profile-name">아빠</div>
        </div>
        <div class="profile-card" onclick="enterMemoApp('엄마')">
            <div class="avatar-box mama">👩</div>
            <div class="profile-name">엄마</div>
        </div>
        <div class="profile-card" onclick="enterMemoApp('아들1')">
            <div class="avatar-box son1">👦</div>
            <div class="profile-name">아들1</div>
        </div>
        <div class="profile-card" onclick="enterMemoApp('아들2')">
            <div class="avatar-box son2">🧑</div>
            <div class="profile-name">아들2</div>
        </div>
    </div>
</div>

<div class="memo-container" id="memoScreen">
    <h2 class="welcome-title" id="welcomeMessage">❤️ 가족 메모장</h2>
    <p style="color: #aaa; margin-bottom: 20px;">우리 가족이 함께 공유하는 실시간 공간입니다.</p>
    
    <div class="input-box">
        <input type="text" id="memoInput" placeholder="메모 입력 혹은 캡처본을 여기에 붙여넣기(Ctrl+V) 하세요..." onpaste="handlePaste(event)">
        
        <div class="preview-area" id="previewArea">
            <button class="cancel-preview" onclick="clearPreview()">X</button>
            <img src="" id="previewImg" class="preview-img" alt="캡처 미리보기">
            <div style="font-size: 12px; color: #aaa; margin-top: 5px;">캡처된 이미지가 감지되었습니다.</div>
        </div>

        <button id="submitBtn" onclick="saveMemoWithCapturedImage()">메모 등록하기</button>
    </div>

    <div class="memo-list" id="memoListArea">
        <div class="no-memo">아직 작성된 메모가 없습니다.</div>
    </div>
</div>

<script>
    // 🔗 파이어베이스 연결 정보 세팅
    const firebaseConfig = {
        databaseURL: "https://family-memo-9c3dc-default-rtdb.firebaseio.com",
        storageBucket: "family-memo-9c3dc.firebasestorage.app"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const storage = firebase.storage();

    let currentWriter = "";
    let pastedFile = null; // 클립보드에서 읽어온 캡처 이미지 임시 저장소

    // 🔒 예전 비밀번호 구조(Z1234 스타일) 4명 전원 롤백 및 적용
    function enterMemoApp(name) {
        const isVerified = sessionStorage.getItem("verified_" + name);

        if (!isVerified) {
            const password = prompt(name + " 프로필의 비밀번호를 입력하세요.");
            
            let isCorrect = false;
            // 🔒 번복 불가능한 기존 약속된 비밀번호 매칭 (Z1234 식)
            if (name === '아빠' && password === 'Z1234아빠@') isCorrect = true;
            else if (name === '엄마' && password === 'Z1234엄마@') isCorrect = true;
            else if (name === '아들1' && password === 'Z1234아들1@') isCorrect = true;
            else if (name === '아들2' && password === 'Z1234아들2@') isCorrect = true;

            if (isCorrect) {
                sessionStorage.setItem("verified_" + name, "true");
            } else {
                alert("비밀번호가 잘못되었습니다.");
                return;
            }
        }

        currentWriter = name;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('memoScreen').style.display = 'block';
        document.getElementById('welcomeMessage').innerText = "❤️ " + name + " 님의 가족 메모장";
        
        loadMemos();
    }

    // 📋 [핵심] 입력창에 Ctrl + V로 이미지를 붙여 넣었을 때 자동으로 파일 가로채기
    function handlePaste(event) {
        const items = (event.clipboardData || event.originalEvent.clipboardData).items;
        
        for (let i = 0; i < items.length; i++) {
            if (items[i].type.indexOf("image") !== -1) {
                // 클립보드 데이터에서 이미지 파일을 바이너리로 추출
                const file = items[i].getAsFile();
                pastedFile = file;

                // 화면에 붙여넣은 캡처본 미리보기 띄우기
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('previewArea').style.display = 'block';
                };
                reader.readAsDataURL(file);
                
                // 입력창에 지저분한 바이너리 텍스트가 적히는 것 방지
                event.preventDefault();
                break;
            }
        }
    }

    // 미리보기 지우기 함수
    function clearPreview() {
        pastedFile = null;
        document.getElementById('previewArea').style.display = 'none';
        document.getElementById('previewImg').src = "";
    }

    // 📸 캡처된 파일 업로드 및 실시간 DB 기록 처리
    function saveMemoWithCapturedImage() {
        const memoInput = document.getElementById('memoInput');
        const submitBtn = document.getElementById('submitBtn');
        
        const text = memoInput.value.trim();
        const file = pastedFile; // 붙여넣기 한 캡처 이미지 할당
        
        if (text === "" && !file) return;

        submitBtn.disabled = true;
        submitBtn.innerText = "업로드 중...";

        if (file) {
            // 스토리지에 고유 캡처 이미지명 생성 후 업로드
            const fileName = "capture_" + Date.now() + ".png";
            const storageRef = storage.ref('images/' + fileName);
            
            storageRef.put(file).then((snapshot) => {
                return snapshot.ref.getDownloadURL();
            }).then((url) => {
                writeToDatabase(text, url);
            }).catch((error) => {
                alert("이미지 업로드에 실패했습니다: " + error.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "메모 등록하기";
            });
        } else {
            writeToDatabase(text, "");
        }
    }

    function writeToDatabase(text, imgUrl) {
        const memoInput = document.getElementById('memoInput');
        const submitBtn = document.getElementById('submitBtn');

        database.ref('memos').push({
            writer: currentWriter,
            content: text,
            imageUrl: imgUrl,
            timestamp: Date.now()
        }).then(() => {
            memoInput.value = "";
            clearPreview(); // 캡처본 임시 저장소 및 화면 리셋
            submitBtn.disabled = false;
            submitBtn.innerText = "메모 등록하기";
        });
    }

    // 최신 내용 상단 정렬 로드
    function loadMemos() {
        database.ref('memos').on('value', (snapshot) => {
            const listArea = document.getElementById('memoListArea');
            listArea.innerHTML = ""; 

            const data = snapshot.val();
            
            if (!data) {
                listArea.innerHTML = '<div class="no-memo">아직 작성된 메모가 없습니다.</div>';
                return;
            }

            Object.keys(data).forEach((key) => {
                const memo = data[key];
                
                const itemDiv = document.createElement('div');
                itemDiv.className = 'memo-item';
                
                const imgTag = memo.imageUrl ? `<img src="${memo.imageUrl}" class="memo-image" alt="가족 업로드 이미지">` : '';
                
                itemDiv.innerHTML = `
                    <div class="memo-header">
                        <span class="author-badge badge-${memo.writer}">${memo.writer}</span>
                        <button class="delete-btn" onclick="deleteMemo('${key}')">❌</button>
                    </div>
                    <div class="memo-text">${memo.content}</div>
                    ${imgTag}
                `;
                
                listArea.insertBefore(itemDiv, listArea.firstChild);
            });
        });
    }

    // 메모 삭제
    function deleteMemo(key) {
        if (confirm("이 메모를 정말 삭제하시겠습니까?")) {
            database.ref('memos/' + key).remove();
        }
    }
</script>

</body>
</html>
