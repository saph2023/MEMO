<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>내 온라인 서비스 앱</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background:#f5f5f5; }
    header { background:#222; color:#fff; padding:15px; text-align:center; }
    main { max-width:800px; margin:20px auto; background:#fff; padding:20px; border-radius:8px; }
    h2 { margin-top:0; }
    .section { margin-bottom:25px; border-bottom:1px solid #ddd; padding-bottom:15px; }
    label { display:block; margin:8px 0 4px; }
    input, textarea { width:100%; padding:8px; box-sizing:border-box; }
    button { margin-top:10px; padding:6px 12px; cursor:pointer; }
    ul { padding-left:18px; }
    li { margin-bottom:12px; }
    .meta { font-size:12px; color:#666; }
  </style>
</head>
<body>
<header>
  <h1>온라인 서비스 앱 (완전 버전)</h1>
</header>
<main>
  <section class="section">
    <h2>항목 등록 / 수정</h2>
    <label>제목</label>
    <input id="titleInput" type="text" placeholder="예: 고객 이름, 작업 제목 등">
    <label>내용</label>
    <textarea id="contentInput" rows="3" placeholder="상세 내용 입력"></textarea>
    <button onclick="saveItem()">저장</button>
    <span id="editInfo" class="meta"></span>
  </section>

  <section class="section">
    <h2>등록된 항목 (최신순)</h2>
    <ul id="itemList"></ul>
  </section>
</main>

<script>
  let items = JSON.parse(localStorage.getItem("items") || "[]");
  let editingIndex = null;

  function formatDate(d) {
    const pad = n => (n < 10 ? '0' + n : n);
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} `
         + `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  function saveToStorage() {
    localStorage.setItem("items", JSON.stringify(items));
  }

  function saveItem() {
    const titleEl = document.getElementById('titleInput');
    const contentEl = document.getElementById('contentInput');
    const title = titleEl.value.trim();
    const content = contentEl.value.trim();

    if (!title) {
      alert('제목을 입력하세요.');
      return;
    }

    if (editingIndex === null) {
      items.push({
        title,
        content,
        createdAt: new Date(),
        updatedAt: null
      });
    } else {
      items[editingIndex].title = title;
      items[editingIndex].content = content;
      items[editingIndex].updatedAt = new Date();
    }

    saveToStorage();
    titleEl.value = '';
    contentEl.value = '';
    editingIndex = null;
    document.getElementById('editInfo').textContent = '';
    renderList();
  }

  // 이 함수에서 원본 인덱스를 유지하며 최신순으로 렌더링하도록 수정했습니다.
  function renderList() {
    const listEl = document.getElementById('itemList');
    listEl.innerHTML = '';

    // 원본 배열을 복사한 뒤 역순으로 뒤집어 최신 글이 먼저 나오게 합니다.
    // .map을 통해 원본 고유 index를 미리 묶어두었기 때문에 수정/삭제 에러가 나지 않습니다.
    const reversedItems = items
      .map((item, index) => ({ item, index }))
      .reverse();

    reversedItems.forEach(({ item, index }) => {
      const li = document.createElement('li');
      const created = formatDate(new Date(item.createdAt));
      const updated = item.updatedAt ? ` / 수정: ${formatDate(new Date(item.updatedAt))}` : '';

      li.innerHTML = `
        <strong>${item.title}</strong><br>
        ${item.content}<br>
        <span class="meta">생성: ${created}${updated}</span><br>
        <button onclick="editItem(${index})">수정</button>
        <button onclick="deleteItem(${index})">삭제</button>
      `;
      listEl.appendChild(li);
    });
  }

  function deleteItem(index) {
    if (!confirm('삭제할까요?')) return;
    items.splice(index, 1);
    saveToStorage();
    renderList();
  }

  function editItem(index) {
    const item = items[index];
    document.getElementById('titleInput').value = item.item ? item.item.title : item.title;
    document.getElementById('contentInput').value = item.item ? item.item.content : item.content;
    editingIndex = index;
    document.getElementById('editInfo').textContent = `지금 ${index+1}번 항목을 수정 중`;
  }

  renderList();
</script>
</body>
</html>
