<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 가족 메모장</title>
    
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #121212; color: #ffffff; font-family: 'Noto Sans KR', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header-container { width: 100%; max-width: 1400px; display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; margin-top: 20px; }
        .search-box { background-color: #1e1e1e; padding: 15px; border-radius: 8px; width: 250px; }
        .search-box input[type="date"] { width: 100%; padding: 8px; background-color: #2c2c2c; border: 1px solid #3d3d3d; color: #ffffff; border-radius: 4px; margin-bottom: 8px; outline: none; }
        .btn-all { padding: 4px 8px; background-color: #333; color: #ccc; border: none; border-radius: 4px; font-size: 11px; cursor: pointer; float: right; }
        .main-title { text-align: center; flex-grow: 1; }
        .main-title h1 { font-size: 28px; font-weight: bold; margin-bottom: 12px; }
        .main-title p { color: #aaaaaa; font-size: 14px; }
        .storage-box { background-color: #1e1e1e; padding: 15px; border-radius: 8px; width: 280px; font-size: 12px; }
        .storage-title { display: flex; justify-content: space-between; margin-bottom: 8px; color: #aaaaaa; }
        .storage-bar-bg { width: 100%; height: 6px; background-color: #333; border-radius: 3px; overflow: hidden; margin-bottom: 8px; margin-top: 15px; }
        .storage-bar-fill { height: 100%; background-color: #e50914; width: 0.1%; transition: width 0.3s ease; }
        .storage-text { text-align: right; color: #e50914; font-weight: bold; font-size: 12px; margin-top: 5px; }
        .container { width: 100%; max-width: 700px; }
        .memo-input-box { background-color: #1e1e1e; padding: 20px; border-radius: 8px; margin-bottom: 25px; }
        textarea { width: 100%; height: 140px; background-color: #2c2c2c; border: 1px solid #3d3d3d; border-radius: 6px; color: #ffffff; padding: 15px; font-size: 14px; resize: none; outline: none; margin-bottom: 15px; line-height: 1.5; }
        textarea::placeholder { color: #666666; }
        .btn-submit { width: 100%; background-color: #e50914; color: #ffffff; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .memo-list { display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }
        .memo-card { background-color: #1e1e1e; padding: 20px; border-radius: 8px; position: relative; }
        .memo-author { display: inline-block; background-color: #fbd46d; color: #000000; font-size: 11px; font-weight: bold; padding: 2px 6px; border-radius: 4px; margin-bottom: 12px; }
        .btn-delete { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #e50914; font-size: 20px; cursor: pointer; line-height: 1; }
        .memo-text { font-size: 15px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
        .memo-image { max-width: 100%; border-radius: 6px; margin-top: 12px; border: 1px solid #3d3d3d; }
        .memo-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; font-size: 12px; color: #666666; }
        .btn-edit-trigger { background: none; border: none; color: #6cb2eb; cursor: pointer; font-size: 12px; }
        .bottom-storage-info { width: 100%; max-width: 700px; text-align: right; padding: 20px 0; color: #666666; font-size: 13px; }
        .bottom-storage-info span { color: #e50914; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="search-box">
            <div style="margin-bottom: 8px;">
                <span style="font-size: 12px; color: #aaa;">📅 날짜별 작업 검색</span>
                <button class="btn-all" onclick="clearDateFilter()">전체보기</button>
            </div>
            <input type="date" id="searchDate" onchange="filterMemosByDate()">
        </div>

        <div class="main-title">
            <h1>💖 아빠 님의 가족 메모장</h1>
            <p>우리 가족이 함께 공유하는 실시간 공간입니다.</p>
        </div>

        <div class="storage-box">
            <div class="storage-title">
                <span>📊 서버 용량 제한 (5GB)</span>
                <span style="cursor:pointer; font-size:11px;" onclick="calculateStorageSize()">새로고침</span>
            </div>
            <div class="storage-bar-bg">
                <div class="storage-bar-fill" id="storageBar"></div>
            </div>
            <div class="storage-text" id="topStorageText">0.00 MB</div>
        </div>
    </div>

    <div class="container">
        <div class="memo-input-box">
            <textarea id="memoText" placeholder="메모 입력 혹은 캡처본을 여기에 붙여넣기(Ctrl+V) 하세요...&#10;(등록은 Ctrl+Enter)"></textarea>
            <button class="btn-submit" onclick="handleMemoSubmit()">메모 등록하기</button>
        </div>

        <div class="memo-list" id="memoList">데이터 불러오는 중...</div>

        <div class="bottom-storage-info">
            <span id="bottomStorageText">0.00 MB</span>
        </div>
    </div>

    <script>
        const targetDbUrl = "https://saph2023-default-rtdb.asia-southeast1.firebasedatabase.app";
        
        const firebaseConfig = {
            projectId: "saph2023",
            databaseURL: targetDbUrl
        };
        
        let database = null;

        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            // [핵심 변경] 주소 버그 우회를 위해 데이터베이스 객체 생성 시 싱가포르 주소를 명시적으로 직접 강제 주입
            database = firebase.database(firebase.app());
            database.jsinterface_ = targetDbUrl; 
        } catch(e) {
            console.error("Firebase 연결 실패:", e);
        }

        // 카카오 초기화
        try {
            if (typeof Kakao !== 'undefined' && !Kakao.isInitialized()) {
                Kakao.init('bfc4502483d1a36707fa47c6d59db619');
            }
        } catch (e) { console.error('Kakao SDK 로드 실패', e); }

        window.onload = function() {
            loadMemosRealtime();
            calculateStorageSize();
        };

        function loadMemosRealtime() {
            const memoListDiv = document.getElementById('memoList');
            if (!database) {
                memoListDiv.innerHTML = '<div style="text-align:center; color:#e50914; padding:20px 0;">⚠️ 데이터베이스 연결 실패</div>';
                return;
            }

            // 구형 SDK 타겟 인스턴스 주소 강제 보정 후 참조 호출
            database.app().database(targetDbUrl).ref('memos').orderByChild('timestamp').on('value', (snapshot) => {
                memoListDiv.innerHTML = '';
                const memos = [];
                snapshot.forEach((childSnapshot) => {
                    memos.push({ id: childSnapshot.key, ...childSnapshot.val() });
                });
                
                if (memos.length === 0) {
                    memoListDiv.innerHTML = '<div style="text-align:center; color:#666; padding:40px 0;">등록된 메모가 없습니다. 첫 메모를 작성해 보세요!</div>';
                    return;
                }

                memos.reverse().forEach((memo) => {
                    const card = document.createElement('div');
                    card.className = 'memo-card';
                    card.setAttribute('data-date', memo.date ? memo.date.substring(0, 11) : '');

                    let imgHtml = memo.imageUrl ? `<img src="${memo.imageUrl}" class="memo-image">` : '';
                    const safeText = (memo.text || '').replace(/`/g, '\\`').replace(/\$/g, '\\$');

                    card.innerHTML = `
                        <span class="memo-author">${memo.author || '아빠'}</span>
                        <button class="btn-delete" onclick="deleteMemo('${memo.id}')">×</button>
                        <div class="memo-text">${memo.text || ''}</div>
                        ${imgHtml}
                        <div class="memo-footer">
                            <span>${memo.date || ''}</span>
                            <button class="btn-edit-trigger" onclick="editMemoPrompt('${memo.id}', \`${safeText}\`)">🛠️ 내용 수정</button>
                        </div>
                    `;
                    memoListDiv.appendChild(card);
                });
            }, (error) => {
                console.error("데이터 읽기 에러 발생:", error);
                memoListDiv.innerHTML = '<div style="text-align:center; color:#aaa; padding:40px 0;">데이터 연동 실패. 네트워크나 파이어베이스 리전 설정을 점검 중입니다.</div>';
            });
        }

        async function handleMemoSubmit() {
            const textarea = document.getElementById('memoText');
            const textContent = textarea.value.trim();

            if (!textContent) { alert('내용을 입력해 주세요.'); return; }
            if (!database) { alert('서버 연결 실패'); return; }

            const now = new Date();
            const dateStr = `${now.getFullYear()}년 ${String(now.getMonth()+1).padStart(2,'0')}월 ${String(now.getDate()).padStart(2,'0')}일 ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            
            const memoData = {
                author: '아빠',
                text: textContent,
                date: dateStr,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            database.app().database(targetDbUrl).ref('memos').push(memoData).then(() => {
                textarea.value = '';
                calculateStorageSize();
            }).catch((err) => {
                alert("등록에 실패했습니다.");
                console.error(err);
            });
        }

        function deleteMemo(id) {
            if (confirm('이 메모를 삭제하시겠습니까?') && database) {
                database.app().database(targetDbUrl).ref(`memos/${id}`).remove().then(() => { calculateStorageSize(); });
            }
        }

        function editMemoPrompt(id, oldText) {
            if (!database) return;
            const newText = prompt('수정 내용을 입력하세요:', oldText);
            if (newText !== null) {
                database.app().database(targetDbUrl).ref(`memos/${id}`).update({ text: newText });
            }
        }

        function filterMemosByDate() {
            const searchInput = document.getElementById('searchDate').value;
            if (!searchInput) return;
            const targetDateStr = searchInput.replace(/(\d{4})-(\d{2})-(\d{2})/, '$1년 $2월 $3일');
            document.querySelectorAll('.memo-card').forEach(card => {
                const cardDate = card.getAttribute('data-date');
                card.style.display = (cardDate && cardDate.includes(targetDateStr)) ? 'block' : 'none';
            });
        }

        function clearDateFilter() {
            if(document.getElementById('searchDate')) document.getElementById('searchDate').value = '';
            document.querySelectorAll('.memo-card').forEach(card => card.style.display = 'block');
        }

        function calculateStorageSize() {
            if (!database) return;
            database.app().database(targetDbUrl).ref('memos').once('value', (snapshot) => {
                const str = JSON.stringify(snapshot.val() || {});
                const bytes = new Blob([str]).size;
                const megaBytes = (bytes / (1024 * 1024)).toFixed(2);
                
                if (document.getElementById('topStorageText')) document.getElementById('topStorageText').innerText = `${megaBytes} MB`;
                if (document.getElementById('bottomStorageText')) document.getElementById('bottomStorageText').innerText = `${megaBytes} MB`;
                if (document.getElementById('storageBar')) {
                    document.getElementById('storageBar').style.width = `${Math.min((megaBytes / 5000) * 100, 100) || 0.1}%`;
                }
            });
        }

        document.getElementById('memoText').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') { handleMemoSubmit(); }
        });
    </script>
</body>
</html>
