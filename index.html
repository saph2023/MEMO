<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 가족 메모장</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body {
            background-color: #141414;
            color: #ffffff;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        
        /* 로그인 화면 */
        .login-container {
            text-align: center;
        }
        h1 {
            font-size: 44px;
            font-weight: 500;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        .subtitle {
            font-size: 18px;
            color: #808080;
            margin-bottom: 40px;
        }
        .profile-list {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        .profile-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 130px;
        }
        .avatar-box {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            transition: transform 0.2s ease, border 0.2s ease;
            border: 3px solid transparent;
        }
        .papa   { background-color: #ffd643; }
        .mama   { background-color: #fca5a5; }
        .son1   { background-color: #93c5fd; }
        .son2   { background-color: #94a3b8; }

        .profile-card:hover .avatar-box {
            transform: scale(1.05);
            border: 3px solid #ffffff;
        }
        .profile-name {
            margin-top: 15px;
            font-size: 16px;
            color: #808080;
            transition: color 0.2s ease;
        }
        .profile-card:hover .profile-name {
            color: #ffffff;
        }

        /* 메모장 본문 화면 */
        .memo-container {
            display: none;
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding: 20px 0;
        }
        .welcome-title {
            font-size: 32px;
            margin-bottom: 5px;
        }
        
        .input-box {
            display: flex;
            gap: 10px;
            margin: 25px 0;
        }
        .input-box input {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            border: none;
            background-color: #333;
            color: white;
            font-size: 16px;
        }
        .input-box button {
            padding: 0 25px;
            border-radius: 8px;
            border: none;
            background-color: #e50914;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .input-box button:hover {
            background-color: #b81d24;
        }

        .memo-list {
            background-color: #222;
            padding: 20px;
            border-radius: 12px;
            min-height: 200px;
            text-align: left;
        }
        .memo-item {
            background-color: #333;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .memo-text {
            font-size: 16px;
            word-break: break-all;
        }
        
        /* 넷플릭스 스타일 이름표 배지 */
        .badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
            margin-right: 8px;
            display: inline-block;
            vertical-align: middle;
        }
        .badge-아빠 { background: #ffd643; color: #854d0e; }
        .badge-엄마 { background: #fca5a5; color: #991b1b; }
        .badge-아들1 { background: #93c5fd; color: #1e40af; }
        .badge-아들2 { background: #94a3b8; color: #1e293b; }

        .delete-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 16px;
        }
        .no-memo {
            color: #666;
            text-align: center;
            margin-top: 80px;
        }
    </style>
</head>
<body>

<div class="login-container" id="loginScreen">
    <h1>우리 가족 메모장 로그인</h1>
    <div class="subtitle">사용하실 프로필을 선택해 주세요.</div>

    <div class="profile-list">
        <div class="profile-card" onclick="enterMemoApp('아빠')">
            <div class="avatar-box papa">👨</div>
            <div class="profile-name">아빠</div>
        </div>
        <div class="profile-card" onclick="enterMemoApp('엄마')">
            <div class="avatar-box mama">👩</div>
            <div class="profile-name">엄마</div>
        </div>
        <div class="profile-card" onclick="enterMemoApp('아들1')">
            <div class="avatar-box son1">👦</div>
            <div class="profile-name">아들1</div>
        </div>
        <div class="profile-card" onclick="enterMemoApp('아들2')">
            <div class="avatar-box son2">🧑</div>
            <div class="profile-name">아들2</div>
        </div>
    </div>
</div>

<div class="memo-container" id="memoScreen">
    <h2 class="welcome-title" id="welcomeMessage">❤️ 가족 메모장</h2>
    <p style="color: #aaa; margin: 0;">우리 가족이 함께 공유하는 실시간 공간입니다.</p>
    
    <div class="input-box">
        <input type="text" id="memoInput" placeholder="가족에게 남길 메모를 입력하세요..." onkeypress="if(window.event.keyCode==13){saveMemo()}">
        <button onclick="saveMemo()">등록</button>
    </div>

    <div class="memo-list" id="memoListArea">
        <div class="no-memo">아직 작성된 메모가 없습니다.</div>
    </div>
</div>

<script>
    // 🔗 파이어베이스 데이터베이스 정보 고정 매칭
    const firebaseConfig = {
        databaseURL: "https://family-memo-9c3dc-default-rtdb.firebaseio.com"
    };
    
    // 안전한 구버전 문법 구조로 앱 초기화 수행
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentWriter = ""; 

    // 프로필 입장 함수
    function enterMemoApp(name) {
        currentWriter = name; 
        
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('memoScreen').style.display = 'block';
        document.getElementById('welcomeMessage').innerText = "❤️ " + name + " 님의 가족 메모장";
        
        // 실시간 메모 동기화 트리거
        loadMemos();
    }

    // 메모 데이터 파이어베이스 등록 함수
    function saveMemo() {
        const input = document.getElementById('memoInput');
        const text = input.value.trim();
        
        if (text === "") return; 

        database.ref('memos').push({
            writer: currentWriter,
            content: text,
            timestamp: Date.now()
        });

        input.value = ""; 
    }

    // 데이터 가져와서 리스트 갱신하는 함수
    function loadMemos() {
        database.ref('memos').on('value', (snapshot) => {
            const listArea = document.getElementById('memoListArea');
            listArea.innerHTML = ""; 

            const data = snapshot.val();
            
            if (!data) {
                listArea.innerHTML = '<div class="no-memo">아직 작성된 메모가 없습니다.</div>';
                return;
            }

            Object.keys(data).forEach((key) => {
                const memo = data[key];
                
                const itemDiv = document.createElement('div');
                itemDiv.className = 'memo-item';
                itemDiv.innerHTML = `
                    <div class="memo-text">
                        <span class="badge badge-${memo.writer}">${memo.writer}</span>
                        <span>${memo.content}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteMemo('${key}')">❌</button>
                `;
                
                listArea.insertBefore(itemDiv, listArea.firstChild);
            });
        });
    }

    // 메모 삭제 처리
    function deleteMemo(key) {
        if (confirm("이 메모를 삭제하시겠습니까?")) {
            database.ref('memos/' + key).remove();
        }
    }
</script>

</body>
</html>
